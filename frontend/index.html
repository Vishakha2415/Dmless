<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DMless - Smart Recruitment Platform</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: #f0f4fa;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            text-align: center;
            max-width: 600px;
            background: white;
            padding: 3rem;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(30, 58, 95, 0.08);
            border: 1px solid #cbd6e6;
        }

        h1 {
            font-size: 3.5rem;
            margin-bottom: 0.5rem;
            letter-spacing: -1px;
            font-weight: 700;
            color: #1e3a5f;
        }

        .tagline {
            font-size: 1.2rem;
            margin-bottom: 2.5rem;
            color: #2b4c7c;
            line-height: 1.6;
            font-weight: 400;
        }

        .features {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin-bottom: 3rem;
            flex-wrap: wrap;
        }

        .feature {
            background: #e8f0fe;
            padding: 0.75rem 1.5rem;
            border-radius: 50px;
            font-weight: 500;
            color: #1e3a5f;
            font-size: 0.95rem;
            border: 1px solid #cbd6e6;
        }

        .buttons {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 2rem;
        }

        .btn {
            padding: 1rem 2.5rem;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.2s ease;
            display: inline-block;
        }

        .btn-primary {
            background: #1e3a5f;
            color: white;
            border: 1px solid #1e3a5f;
        }

        .btn-primary:hover {
            background: #2b4c7c;
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(30, 58, 95, 0.15);
        }

        .btn-secondary {
            background: white;
            color: #1e3a5f;
            border: 1px solid #cbd6e6;
        }

        .btn-secondary:hover {
            background: #f8fafd;
            border-color: #1e3a5f;
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(30, 58, 95, 0.08);
        }

        .footer {
            margin-top: 2rem;
            font-size: 0.85rem;
            color: #8a9db0;
            border-top: 1px solid #e2e8f0;
            padding-top: 2rem;
        }

        /* Stats Section */
        .stats {
            display: flex;
            justify-content: space-around;
            margin: 2rem 0;
            padding: 1.5rem 0;
            border-top: 1px solid #e2e8f0;
            border-bottom: 1px solid #e2e8f0;
        }

        .stat-item {
            text-align: center;
        }

        .stat-number {
            font-size: 1.8rem;
            font-weight: 700;
            color: #1e3a5f;
            line-height: 1.2;
        }

        .stat-label {
            font-size: 0.85rem;
            color: #2b4c7c;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        @media (max-width: 480px) {
            .container {
                padding: 2rem 1.5rem;
            }
            
            h1 {
                font-size: 2.5rem;
            }
            
            .tagline {
                font-size: 1rem;
            }
            
            .feature {
                padding: 0.6rem 1.2rem;
                font-size: 0.85rem;
            }
            
            .btn {
                width: 100%;
                padding: 0.9rem 1.5rem;
            }
            
            .stats {
                flex-direction: column;
                gap: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>DMless</h1>
        <p class="tagline">Enterprise Hiring Platform with AI-Powered Knockout Screening</p>
        
        <div class="features">
            <span class="feature">🎯 Smart Screening</span>
            <span class="feature">⚡ Instant Knockout</span>
            <span class="feature">📊 Real-time Analytics</span>
        </div>

        <!-- Stats Section -->
        <div class="stats">
            <div class="stat-item">
                <div class="stat-number">10,000+</div>
                <div class="stat-label">Candidates</div>
            </div>
            <div class="stat-item">
                <div class="stat-number">500+</div>
                <div class="stat-label">Companies</div>
            </div>
            <div class="stat-item">
                <div class="stat-number">95%</div>
                <div class="stat-label">Success Rate</div>
            </div>
        </div>

        <div class="buttons">
            <a href="/static/login.html" class="btn btn-primary">Sign In</a>
            <a href="/static/signup.html" class="btn btn-secondary">Create Account</a>
        </div>

        <div class="footer">
            © 2025 DMless. All rights reserved. | Enterprise Recruitment Solution
        </div>
    </div>
</body>
</html>
